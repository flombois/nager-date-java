name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: maven

      - name: Setup Locale
        run: sudo locale-gen en_US.UTF-8 && sudo update-locale LANG=en_US.UTF-8 && locale

      - name: Build and test
        run: mvn --batch-mode verify
